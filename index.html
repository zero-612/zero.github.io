<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小王子</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent-amber: #c8a96e;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Serif SC', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(200,169,110,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      width: 100%;
      max-width: 680px;
      padding: 96px 32px 64px;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .name {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 300;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .name span { color: var(--accent-amber); }

    .tagline {
      margin-top: 28px;
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
    }

    .divider {
      width: 100%;
      max-width: 680px;
      padding: 0 32px;
    }
    .divider hr {
      border: none;
      border-top: 1px solid var(--border);
    }

    /* ── About cards ── */
    .cards {
      width: 100%;
      max-width: 680px;
      padding: 48px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #444; }

    .card-icon { font-size: 24px; margin-bottom: 16px; }
    .card-title { font-size: 14px; font-weight: 400; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

    /* ── Works ── */
    .section-label {
      width: 100%;
      max-width: 680px;
      padding: 40px 32px 20px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .works {
      width: 100%;
      max-width: 680px;
      padding: 0 32px 48px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .work-item {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .work-item:hover { border-color: #444; }

    .work-emoji { font-size: 32px; }
    .work-label { font-size: 12px; color: var(--muted); }

    /* ── Projects ── */
    .projects {
      width: 100%;
      max-width: 680px;
      padding: 0 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project-card {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .project-card:hover {
      border-color: var(--accent-amber);
    }
    .project-card:hover .project-arrow {
      color: var(--accent-amber);
      transform: translateX(3px);
    }

    .project-icon {
      font-size: 28px;
      flex-shrink: 0;
    }

    .project-info {
      flex: 1;
    }

    .project-name {
      font-size: 14px;
      font-weight: 400;
      margin-bottom: 4px;
    }

    .project-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .project-arrow {
      font-size: 16px;
      color: var(--border);
      transition: color 0.2s, transform 0.2s;
      flex-shrink: 0;
    }

    /* ── Social ── */
    .social {
      width: 100%;
      max-width: 680px;
      padding: 0 32px 48px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .social-btn:hover {
      border-color: var(--accent-amber);
      color: var(--accent-amber);
    }
    .social-icon { font-size: 16px; }

    /* ── Contact ── */
    .contact {
      width: 100%;
      max-width: 680px;
      padding: 0 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .contact-item a {
      color: var(--muted);
      text-decoration: none;
    }
    .contact-item a:hover { color: var(--accent-amber); }

    /* ── Signature ── */
    .signature {
      width: 100%;
      max-width: 680px;
      padding: 32px 32px 80px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .sig-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent-amber);
      flex-shrink: 0;
    }
    .sig-text { font-size: 13px; color: var(--muted); font-style: italic; }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
      .works { grid-template-columns: repeat(2, 1fr); }
      .hero { padding: 72px 24px 48px; }
    }
  </style>
</head>
<body>
